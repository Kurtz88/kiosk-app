<script>
/* 슬라이더 */
const sl    = document.getElementById('sl');
const sv    = document.getElementById('sv');
const shell = document.getElementById('shell');

const applyScale = v => {
  shell.style.transform = `scale(${v/100})`;
  shell.style.transformOrigin = 'top center';
  sv.textContent = v + '%';
};
applyScale(sl.value);
sl.addEventListener('input', e => applyScale(+e.target.value));

/* 풀스크린 */
const btnFull = document.getElementById('btnFull');
const devBar  = document.getElementById('devBar');
let isFull = false;

function enterFull() {
  document.documentElement.requestFullscreen?.()
    .then(() => {
      document.body.classList.replace('dev-mode', 'full-mode');
      devBar.style.display = 'none';

      shell.style.padding      = '0';
      shell.style.border       = 'none';
      shell.style.borderRadius = '0';
      shell.style.background   = 'transparent';
      shell.style.boxShadow    = 'none';

      const scaleX = window.innerWidth  / 1712;
      const scaleY = window.innerHeight / 3043;
      const scale  = Math.min(scaleX, scaleY);

      shell.style.transform       = `scale(${scale})`;
      shell.style.transformOrigin = 'top left';

      btnFull.textContent = '✕ 개발 모드로 돌아가기';
      isFull = true;
    })
    .catch(() => {});
}

function exitFull() {
  isFull = false;
  btnFull.textContent = '⛶ 풀스크린 미리보기';

  shell.style.padding = '';
  shell.style.border = '';
  shell.style.borderRadius = '';
  shell.style.background = '';
  shell.style.boxShadow = '';

  document.body.classList.replace('full-mode', 'dev-mode');
  devBar.style.display = '';

  requestAnimationFrame(() => applyScale(+sl.value));

  if (document.fullscreenElement) document.exitFullscreen?.().catch(() => {});
}

btnFull.addEventListener('click', () => isFull ? exitFull() : enterFull());
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFull) exitFull();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isFull) exitFull();
});



/* === 키보드 모달 동작 스크립트 === */
const keyboardModal = document.getElementById('keyboardModal');
const kioskInput = document.getElementById('kioskInput');

// 검색하기 탭 클릭 시 모달 열기
document.querySelector('.k-tab-search').onclick = () => {
  keyboardModal.classList.add('show');
};

// 하단 [닫기] 버튼 클릭 시 모달 닫기 (오류 수정)
document.querySelector('.k-btn-close').onclick = () => {
  keyboardModal.classList.remove('show');
};

// 입력창 옆 [✕] 버튼 클릭 시 글자 초기화
document.querySelector('.k-btn-clear').onclick = () => {
  kioskInput.value = '';
};

// 모달 바깥(검정색 반투명 배경)을 클릭해도 닫히도록 추가 (편의성)
keyboardModal.onclick = (e) => {
  if (e.target === keyboardModal) {
    keyboardModal.classList.remove('show');
  }
};

// 키보드 글자 버튼 입력
document.querySelectorAll('.k-key').forEach(key => {
  key.onclick = () => {
    if (key.classList.contains('k-space')) {
      kioskInput.value += ' ';
    } else if (key.classList.contains('k-del')) {
      kioskInput.value = kioskInput.value.slice(0, -1);
    } else {
      kioskInput.value += key.textContent;
    }
  };
});

// 하단 [검색] 버튼 클릭
document.querySelector('.k-btn-submit').onclick = () => {
  const keyword = kioskInput.value;
  if(keyword.trim() !== '') {
    // 인터넷이 안되는 환경이므로 list.html에 자바스크립트로 필터링 기능이 있어야 합니다.
    location.href = 'list.html?search=' + encodeURIComponent(keyword);
  }
};
</script>
