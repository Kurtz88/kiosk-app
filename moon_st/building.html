<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  /* 변수 설정 (핑크 주축) */
  .building-wrapper {
    --main-pink: #DE5B9E;
    --sub-pink: #FFF5FA;
    --text-main: #2A1A22;
    --text-sub: #8B7A83;
    --border-pink: #F8D7E8;
    --bg-white: #FFFFFF;

    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    font-family: 'Pretendard', sans-serif;
    background-color: var(--bg-white);
    padding: 2vh 4vw; /* 세로 여백 vh 적용 */
  }

  /* 안내 문구 스타일 */
  .building-wrapper .helper-text {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    font-size: 1.8vh; /* 높이 기준 폰트 크기 */
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 2vh;
  }

  .building-wrapper .helper-icon {
    color: var(--main-pink);
    width: 2.2vh;
    height: 2.2vh;
    flex-shrink: 0;
  }

  /* 빌딩 전체 구조 */
  .building-wrapper .building-stack {
    display: flex;
    flex-direction: column;
    border: 0.3vh solid var(--border-pink);
    border-radius: 2.5vh;
    background-color: var(--bg-white);
    overflow: hidden;
    box-shadow: 0 1vh 3vh rgba(222, 91, 158, 0.08);
  }

  /* 각 층의 행 */
  .building-wrapper .floor-row {
    display: flex;
    border-bottom: 0.15vh solid var(--border-pink);
  }

  .building-wrapper .floor-row:last-child {
    border-bottom: none;
  }

  /* 왼쪽 층수 영역 */
  .building-wrapper .floor-number {
    width: 15vw;
    min-width: 50px;
    background-color: var(--sub-pink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 2.2vh;
    color: var(--main-pink);
    border-right: 0.15vh solid var(--border-pink);
    flex-shrink: 0;
  }

  /* 오른쪽 식당 그리드 영역 */
  .building-wrapper .shop-grid {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    padding: 1.5vh;
    gap: 1.2vh;
    background-color: var(--bg-white);
  }

  /* 개별 식당 유닛 */
  .building-wrapper .shop-unit {
    flex: 0 0 calc(33.333% - 0.8vh);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5vh 0.5vw;
    background-color: var(--bg-white);
    border: 0.15vh solid #F2F2F2;
    border-radius: 1.8vh;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .building-wrapper .shop-unit:active {
    transform: scale(0.95);
    background-color: var(--sub-pink);
    border-color: var(--main-pink);
  }

  .building-wrapper .shop-unit .icon {
    font-size: 2.8vh;
    margin-bottom: 0.5vh;
  }

  .building-wrapper .shop-unit .name {
    font-size: 1.6vh;
    font-weight: 700;
    color: var(--text-main);
    text-align: center;
    margin-bottom: 0.3vh;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 90%;
  }

  /* 카테고리 표시 */
  .building-wrapper .shop-category {
    font-size: 1.3vh;
    font-weight: 700;
    color: var(--main-pink);
    background-color: var(--sub-pink);
    padding: 0.2vh 0.8vw;
    border-radius: 0.5vh;
  }

  /* 상가 없을 때 */
  .building-wrapper .empty-unit {
    width: 100%;
    padding: 4vh 0;
    text-align: center;
    color: var(--text-sub);
    font-size: 1.6vh;
    font-weight: 500;
  }
</style>

<section class="building-wrapper">

      <path d="M12 8V12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 16H12.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    음식점을 클릭하시면 자세히 보실 수 있습니다.
  </div>

  <div class="building-stack">
    
    <div class="floor-row">
      <div class="floor-number">3F</div>
      <div class="shop-grid">
        <div class="shop-unit">
          <span class="icon">🍱</span>
          <span class="name">본죽&비빔밥</span>
          <span class="shop-category">한식</span>
        </div>
        <div class="shop-unit">
          <span class="icon">🍜</span>
          <span class="name">홍콩반점</span>
          <span class="shop-category">중식</span>
        </div>
        <div class="shop-unit">
          <span class="icon">🍕</span>
          <span class="name">도미노피자</span>
          <span class="shop-category">양식</span>
        </div>
        <div class="shop-unit">
          <span class="icon">🥘</span>
          <span class="name">마라공방</span>
          <span class="shop-category">중식</span>
        </div>
      </div>
    </div>

    <div class="floor-row">
      <div class="floor-number">2F</div>
      <div class="shop-grid">
        <div class="shop-unit">
          <span class="icon">🥗</span>
          <span class="name">샐러디</span>

    <div class="floor-row">

      </div>
    </div>

  </div>
</section>
